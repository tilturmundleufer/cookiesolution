<!--
  Cookie Solution – Webflow-Integration
  =====================================

  SCHRITT 1 – Head Code (Pflicht für zuverlässiges Google Consent Mode)
  --------------------------------------------------------------------
  Webflow → Project Settings → Custom Code → Head Code
  Füge das folgende <script> als ERSTES ein, vor GTM, GA4, Facebook Pixel
  und allen anderen Tracking-Skripten. Die Werte müssen mit cookie-solution.js
  (GCM_DEFAULT_CONSENT) übereinstimmen.

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ window.dataLayer.push(arguments); }
    window.gtag = window.gtag || gtag;
    if(!window.__csGcmDefaultsApplied){
      window.gtag('consent','default',{
        ad_storage:'denied',
        ad_user_data:'denied',
        ad_personalization:'denied',
        analytics_storage:'denied',
        functionality_storage:'denied',
        security_storage:'granted'
      });
      window.__csGcmDefaultsApplied = true;
    }
  </script>

  SCHRITT 2 – Footer / vor </body>
  -------------------------------
  Den folgenden Block (ab Styling) in ein Embed-Element oder „Footer Code“
  legen – nach dem Head-Snippet. So bleiben Consent-Defaults vor dem Tag-Load.

  Tags wirklich blockieren
  -------------------------
  • Normale <script src="…gtm…"> laden sofort und setzen Cookies. Stattdessen
    GTM/GA4 nur als Platzhalter einbinden, der nach Zustimmung aktiviert wird:
    type="text/plain" data-category="analytics" (oder marketing).

  Beispiel GTM: Das offizielle Container-Snippet (aus dem GTM-UI) als EIN
  <script type="text/plain" data-category="analytics">…</script>-Block ohne
  separates src-Attribut einfügen (GTM-XXXX ersetzen).

  Beispiel GA4 (gtag.js):
  <script type="text/plain" data-category="analytics" async src="https://www.googletagmanager.com/gtag/js?id=G-XXXX"></script>
  <script type="text/plain" data-category="analytics">
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXX');
  </script>

  Typische Fehler
  ---------------
  • GA/GTM/Webflow-Analytics zusätzlich ungeblockt in Head → Cookies vor Consent.
  • Head-Bootstrap vergessen → Consent Mode zu spät.
  • Embed nur im Body, ohne Head-Snippet → gleiches Problem.

  Optionen (eigene gehostete cookie-solution.js)
  ----------------------------------------------
  • showOnlyInRegions: null = Banner für alle. z. B. ["EU","UK","CH"] = Banner
    nur bei passender Region (Heuristik über Browser-Sprache; optional geoEndpoint).
  • Bereits gesetzte Third-Party-Cookies bleiben nach Widerruf ggf. im Browser;
    Nutzer können sie in den Browser-Einstellungen löschen.

  Datenschutz: Hinweis in der Datenschutzerklärung auf Cookie-Einstellungen
  und ggf. Löschmöglichkeit ergänzen.
-->
